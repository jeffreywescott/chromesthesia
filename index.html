<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chromesthesia</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #canvas {
        display: block;
        width: 100vw;
        height: 100dvh;
        filter: blur(60px);
      }

      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        cursor: pointer;
        user-select: none;
        touch-action: manipulation;
        z-index: 10;
        transition: opacity 0.6s ease;
      }

      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #overlay h1 {
        font-family: 'Georgia', serif;
        font-size: clamp(1rem, 5.5vw, 4rem);
        font-weight: 300;
        letter-spacing: 0.15em;
        margin-bottom: 1.5rem;
        text-transform: uppercase;
      }

      #overlay p {
        font-family: 'Georgia', serif;
        font-size: clamp(0.9rem, 2vw, 1.2rem);
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.1em;
      }

      #overlay p.description {
        font-size: clamp(0.8rem, 1.8vw, 1rem);
        color: rgba(255, 255, 255, 0.35);
        text-align: center;
        line-height: 1.7;
        margin-bottom: 2rem;
        letter-spacing: 0.05em;
      }

    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <h1>Chromesthesia</h1>
      <p class="description">Play music near your microphone.<br>Each note lights up a color.</p>
      <p>tap to begin</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
